version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: mindsquare_db
    restart: always
    environment:
      POSTGRES_USER: mindsquare
      POSTGRES_DB: mindsquare
      POSTGRES_PASSWORD: "${DB_PASSWORD}"
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - mindsquare_network

  web:
    build: .
    container_name: mindsquare_web
    restart: always
    ports:
      - "3000:3000"
    environment:

      DB_HOST: db
      DB_PORT: 5432
      DB_USER: mindsquare
      DB_NAME: mindsquare
      DB_PASSWORD: "${DB_PASSWORD}"
      DB_SSL: "false"

      GOOGLE_CLIENT_ID: "${GOOGLE_CLIENT_ID}"
      ZOOM_MEETING_URL: "${ZOOM_MEETING_URL}"
      JWT_SECRET: "${JWT_SECRET}"

      NODE_ENV: production
    depends_on:
      - db
    networks:
      - mindsquare_network

volumes:
  pgdata:
    driver: local

networks:
  mindsquare_network:
    driver: bridge
